services:
  - type: web
    name: manas-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build && npx prisma db push
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: manas-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: FRONTEND_URL
        value: https://manas.app
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        value: MANAS <no-reply@manas.app>
      - key: OTP_EXPIRY_MINUTES
        value: 10

databases:
  - name: manas-db
    region: oregon
    plan: free
    postgresMajorVersion: 16
