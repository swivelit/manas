services:
  - type: web
    name: manas-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    # NOTE: still `db push` for this transitional release. Versioned migrations
    # live in prisma/migrations/0_init. See DEPLOY.md "Database migrations" for
    # the one-time cutover to `npx prisma migrate deploy`.
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build && npx prisma db push
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: manas-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: FRONTEND_URL
        value: https://manas.app
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        value: MANAS <no-reply@manas.app>
      - key: OTP_EXPIRY_MINUTES
        value: 10
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: MANAS Admin
      - key: MEETING_PROVIDER
        value: jaas
      - key: MEETING_SERVER_URL
        value: https://8x8.vc
      - key: MEETING_APP_ID
        sync: false
      - key: MEETING_JWT_KID
        sync: false
      - key: MEETING_JWT_PRIVATE_KEY
        sync: false
      - key: MEETING_JWT_SECRET
        sync: false
      - key: MEETING_JWT_ALG
        value: RS256
      - key: MEETING_TOKEN_TTL_MINUTES
        value: 120
      - key: MEETING_ENABLE_AUTH
        value: true

databases:
  - name: manas-db
    region: oregon
    plan: free
    postgresMajorVersion: 16
